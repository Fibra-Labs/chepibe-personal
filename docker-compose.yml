services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        - ALLOWED_PHONE=${ALLOWED_PHONE}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - WORKER_API_URL=http://worker:3001
      - ALLOWED_PHONE=${ALLOWED_PHONE}
      - ORIGIN=http://localhost:${WEB_PORT:-3000}
    depends_on:
      worker:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/whatsapp-worker/Dockerfile
    ports:
      - "${WORKER_PORT:-3001}:3001"
    environment:
      - ALLOWED_PHONE=${ALLOWED_PHONE:?ALLOWED_PHONE is required}
      - GROQ_API_KEY=${GROQ_API_KEY:?GROQ_API_KEY is required}
      - GROQ_WHISPER_MODEL=${GROQ_WHISPER_MODEL:-whisper-large-v3}
      - GROQ_LLM_MODEL=${GROQ_LLM_MODEL:-llama-3.1-8b-instant}
      - DATABASE_URL=${TURSO_URL:-file:/data/chepibe-personal.db}
      - DATABASE_PASSWORD=${TURSO_PASSWORD:-}
      - PORT=3001
      - DEBUG=${DEBUG:-false}
      - NODE_ENV=production
    volumes:
      - ./data:/data
    restart: unless-stopped