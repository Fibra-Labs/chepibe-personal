name: Publish Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/shared/**'
      - 'packages/whatsapp-worker/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          registry-url: https://npm.pkg.github.com

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @chepibe-personal/shared build
          pnpm --filter @chepibe-personal/whatsapp-worker build

      - name: Publish shared
        run: pnpm --filter @chepibe-personal/shared publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish whatsapp-worker
        run: pnpm --filter @chepibe-personal/whatsapp-worker publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
